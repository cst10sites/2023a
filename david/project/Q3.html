<body>
<h1>3. What was the final of the 2022 FIFA World Cup?</h1><br>
<form>
  <input type="radio" name="choice" value="Wrong"> Argentina vs Brazil <br>
  <input type="radio" name="choice" value="Right"> Argentina vs France <br>
  <input type="radio" name="choice" value="Wrong"> France vs England <br>
  <input type="radio" name="choice" value="Wrong"> Canada vs India <br>
</form>
<button onclick="submitAnswer()">Submit Answer</button>
<p style="text-align:right;"><a href="Q4.html">Next question</a></p>

<script>
var submitAnswer = function() {

  var radios = document.getElementsByName('choice');
  var val= "";
  for (var i = 0, length = radios.length; i < length; i++) {
      if (radios[i].checked) {
         val = radios[i].value; 
         break;
       }
  }
  
  if (val == "" ) {
    alert('please select a choice');
  } else if ( val == "Right" ) {
    alert('Good choice');
  } else {
    alert('Rethink your life choices');
  }
};
</script>
</body>
