<p>Total clicks</p>
<p id="display"></p>
<p>Clicks per second</p>
<p id="displayTime"></p>
<button onclick= "reset()">Reset</button

</div>






<script>

var startTime = new Date();
var nClicks = 0;


function updateCPS() {

	
	if (nClicks == 0) {
		startTime = new Date();
		nClicks = nClicks + 1;
		document.getElementById('display').innerHTML = nClicks;
	}
	else {
		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime)/1000;
		

		nClicks = nClicks + 1;
		document.getElementById('display').innerHTML = nClicks;
		document.getElementById('displayTime').innerHTML = nClicks/timeElapsed;
	}
	

}

function reset() {
	window.location.reset
}



</script>
