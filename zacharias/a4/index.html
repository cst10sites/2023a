<body>

<h1>Cookie Clicker Game</h1>
<div>
<h3><a target="" href="quiz.html">Quiz</a></h3>
<p>Click the cookie as fast as you can to see how fast your CPS is.</p>
<input style="width:15%;" type="image" src="https://pngimg.com/uploads/cookie/cookie_PNG13680.png" onclick="updateCPS();" class="center">
<br>
<button onclick="resetWatch();">Reset</button>
<h3>Your CPS</h3><h3 id="cps"></h3>
<H3>Current Clicks:</h3><h3 id="display"></h3>
<h3>Time Elapsed:</h3><h3 id="timeElapsed"></h3>


<script>

var startTime = new Date();
var nClicks = 0; 

function resetWatch() {
	window.location.reload();
}

function updateCPS() {
	if (nClicks == 0) {
		
		startTime = new Date();
		nClicks = nClicks +1;
		document.getElementById('display').innerHTML = nClicks;
		document.getElementById('cps').innerHTML = CPS;
		document.getElementById('timeElapsed').innerHTML = timeElapsed / 1000;
		
	}	
	else {
		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime);
		document.getElementById('timeElapsed').innerHTML = timeElapsed / 1000;
		var CPS = nClicks / (timeElapsed / 1000);
		document.getElementById('cps').innerHTML = CPS;
		document.getElementById('display').innerHTML = nClicks;
		nClicks = nClicks + 1;
	}
}



setInterval(updateTime, 100);

function updateTime(){
	if (nClicks > 0){
		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime) / 1000;
		document.getElementById("timeElapsed").innerHTML = timeElapsed;
	}
}

</script>
</div>
