<form>

<form>
    <label><b>Which one's are used in the &lt;head&gt;?</b></label><br>
    <input type="checkbox" value="&lt;meta charset="UTF-8&gt;" id="meta" name="group">
    <label>&lt;meta charset="UTF-8&gt;</label>
    <input type="checkbox" value="&lt;body&gt;" id="body" name="group">
    <label>&lt;body&gt;</label><br>
    <input id="title" type="checkbox" value="&lt;Title&gt;" name="group">
    <label>&lt;Title&gt;</label>
    <input id="script" type="checkbox" value="&lt;script&gt;" name="group">
    <label>&lt;script&gt;</label><br>
    <input type="button" value="Submit" onclick="checkAnswer();"><br> 
	<input type="reset"><br> 
</form>

<script>
	function submitAnswer()	{
		if(document.getElementById('HyperText Markup Language').checked == true)	{
			alert('Your answer is correct!');
		}
		else {
			alert('You are wrong, please try again');
		}
		
	}
	
	function checkAnswer() {
		var correctAnswer1 = document.getElementById('meta').checked;
		var correctAnswer2 = document.getElementById('title').checked;
		var incorrectAnswer1 = document.getElementById('body').checked;
		var incorrectAnswer2 = document.getElementById('script').checked;
	
		if (correctAnswer1 == true && correctAnswer2 == true && incorrectAnswer1 == false && incorrectAnswer2 == false)  {
			alert('You are correct!');
		}
		else {
			alert('You are wrong, please try again');
		}
	
	
	
	
	}
	










</script>
