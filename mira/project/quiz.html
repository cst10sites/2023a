<h2 style="text-align: center; ">QUIZ - Make sure you read carefully!</h2>

<div id="quiz"></div>
<button id="submit">Submit Quiz</button>
<div id="results"></div>

<script>

(function(){
  function buildQuiz(){
    // HTML output
    const output = [];

    //each question
    myQuestions.forEach(
      (currentQuestion, questionNumber) => {

        
        const answers = [];

        
        for(letter in currentQuestion.answers){

          // html button
          answers.push(
            `<label>
              <input type="radio" name="question${questionNumber}" value="${letter}">
              ${letter} :
              ${currentQuestion.answers[letter]}
            </label>`
          );
        }

        // add this question and its answers to the output
        output.push(
          `<div class="question"> ${currentQuestion.question} </div>
          <div class="answers"> ${answers.join('')} </div>`
        );
      }
    );

  
    quizContainer.innerHTML = output.join('');
  }

  function showResults(){

    
    const answerContainers = quizContainer.querySelectorAll('.answers');

   
    let numCorrect = 0;

    
    myQuestions.forEach( (currentQuestion, questionNumber) => {

      // find selected answer
      const answerContainer = answerContainers[questionNumber];
      const selector = `input[name=question${questionNumber}]:checked`;
      const userAnswer = (answerContainer.querySelector(selector) || {}).value;

      // correct answer:
      if(userAnswer === currentQuestion.correctAnswer){
        // add to the number of correct answers
        numCorrect++;

        // answers green
        answerContainers[questionNumber].style.color = 'lightgreen';
      }
      // wrong answer
      else{
        // answers red
        answerContainers[questionNumber].style.color = 'red';
      }
    });

    // correct answers
    resultsContainer.innerHTML = `${numCorrect} out of ${myQuestions.length}`;
  }

  const quizContainer = document.getElementById('quiz');
  const resultsContainer = document.getElementById('results');
  const submitButton = document.getElementById('submit');
  const myQuestions = [
    {
      question: "The _______ Maple Leafs:",
      answers: {
        a: "Boston",
        b: "Toronto",
        c: "Montreal"
      },
      correctAnswer: "b"
    },
    {
      question: "who is credited as the creator of modern hockey?",
      answers: {
        a: "Conn Smythe",
        b: "Mats Sundin",
        c: "James Creighton"
      },
      correctAnswer: "c"
    },
    {
      question: "who joined the leafs in 1976? ",
      answers: {
        a: "Borje Salming",
        b: "Tim Horton",
        c: "Johnny Bower",
        d: "Mats Sundin"
      },
      correctAnswer: "a"
    },
	

    {
      question: "When was the last time the leafs won the cup?",
      answers: {
        a: "1977",
        b: "1976",
        c: "1967"
      },
      correctAnswer: "c"
    },
	
	    {
      question: "who leads the leafs in most goals in one season?",
      answers: {
        a: "Lanny McDonald",
        b: "Auston Matthews",
        c: "Borje Salming"
      },
      correctAnswer: "b"
    },
	    {
      question: "How many stanley cups have the leafs won in total?",
      answers: {
        a: "21",
        b: "9",
        c: "17",
		d: "13"
      },
      correctAnswer: "d"
    },
	
	    {
      question: "Who is the leafs all time leading goal scorer?",
      answers: {
        a: "Danny Sitller",
        b: "Nazem Kadri",
        c: "Mats Sundin",
		d: "Mitch Marner"
      },
      correctAnswer: "c"
    }
	
	
	
	
  ];

  buildQuiz();


  submitButton.addEventListener('click', showResults);
})();

</script>
