<form>

<input type="button" value="Submit" onclick="checkLang()">

<form>
<label>What are the correct tag(s) for a header?</label><br>
<input type="checkbox" value="h1" id="correctAns1">

<input type="checkbox" value="1h" id="incorrectAns1" >

<input type="checkbox" value="h2" id="correctAns2">

<input type="button" value="submit" onclick="checkHeader()">

</form>


<label></label>

</div>


<script>

function checkLang() {
	
	var correctAnswer = document.getElementById("correctLang").checked;
	
	// alert(correctAnswer);

	if (correctAnswer == true) {
		alert("Good Job!");
		
	}
	 else {
		alert("uh oh!");
	}
	
}

function checkHeader() {
	var correctAns1 = document.getElementById("correctAns1").checked;
	var correctAns2 = document.getElementById("correctAns2").checked;
	var incorrectAns1 = document.getElementById("incorrectAns1").checked;
	var incorrectAns2 = document.getElementById("incorrectAns2").checked;
	
	if(correctAns1 == true && correctAns2 == true && incorrectAns1 == false && incorrectAns2 == false) {
		alert("Good Job!");
	
	}
	
	else {
		alert("nope!");
	}
	

}

</script>
