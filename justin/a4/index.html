<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="styles.css">
<meta charset="UTF-8">
<title>Assignment 4</title>
</head>
<body>
<h2>Cookie Clicker</h2>
<p>Click as fast you can and get rewarded with delicious virtual cookies!</p>
<button onclick="updateCPS(); "><img alt="cookie image" width="250" height="250" src="https://pngimg.com/uploads/cookie/cookie_PNG13656.png"></button>
<p id="CPS">Clicks per second:</p>
<p id="total">Cookie inventory:</p>
<script>

var nClicks = 0;
var startTime = new Date();

function updateCPS() {
	if (nClicks == 0) {
	
	
		
		// reset startTime
		startTime = new Date() ;
		
		// increase nClicks by 1
	nClicks++;
	}
	

	else {
		// note: this part runs when nClicks > 0
		// 1. create variable currentTime
		var currentTime = new Date();
		// 2. create variable timeElapsed and subtract start and currentTime
		var timeElapsed =  (currentTime-startTime) / 1000;
		// 3. calculate CPS = nClicks ÷ timeElapsed 
		var CPS = nClicks / timeElapsed;
		//    BUT timeElapsed be measured in seconds (not milliseconds)
		// 4. display CPS using id
		nClicks++;
	document.getElementById('CPS').innerHTML = "Clicks per second: " + CPS;
	}
	document.getElementById('total').innerHTML = "Cookie inventory: " + nClicks;
}
</script>
</body>
</html>
