<script>
function tacoBell() {
	document.getElementById('tacoBelldisplay').innerHTML =
	document.getElementById('tacoBelldisplay').innerHTML + 'Curse you Perry the Platypus. ';
}
var startTime = new Date();
var nClicks = 0;
var currentTime = new Date();
var timeElapsed = currentTime - startTime;
function updateCPS() {
	if (nClicks == 0) {
		// reset startTime
		// increase Nclicks
		startTime = new Date();
		nClicks = nClicks + 1
	}
	else {
		var currentTime = new Date();
		var timeElapsed = currentTime - startTime;
		document.getElementById('display2').innerHTML = timeElapsed / 1000;
		var CPS = nClicks / (timeElapsed / 1000);
		document.getElementById('display3').innerHTML = CPS;
		nClicks = nClicks + 1
		// updateCPS = nClicks + timeElapsed
		// note this part runs when nclicks > 0
		// 1. create variable current time
		// 2. create variable time elapsed and subtract start and current time
		// 3. calculate CPS = nClicks + timeElapsed
		//	BUT timeElapsed be measured in seconds (not miliseconds)
		// 4. display CPS using id
	}
	
	document.getElementById('display').innerHTML = nClicks;
}
</script>
