<body>

<h3>Coding Language Quiz</h3> 
<div>
<form>
    <label><strong>What is the coding language for designing the background of a website?</strong></label>
    <div>
	<input type="radio" value="HTML" name="group">
    <label>HTML</label><br>
    <input type="radio" value="JavaScript" name="group">
    <label>JavaScript</label><br>
    <input id="correctLang" type="radio" value="CSS" name="group">
    <label>CSS</label><br>
	<input type="radio" value="Python" name="group">
    <label>Python</label><br>
	
    <input type="button" value="Submit" onclick="checkLang();"><br> 
	
    <input type="reset"><br> 
</form>



<script>  

function checkLang() {
    var correctAnswer = document.getElementById("correctLang").checked;

    
    if (correctAnswer == true) {
        alert("Your answer is correct!");
    }
    else {
        alert("That is incorrect");
    }   
}
</script>
